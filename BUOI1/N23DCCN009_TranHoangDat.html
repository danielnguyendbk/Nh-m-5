<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tailwind CSS Exercise</title>
  </head>
  <body class="bg-white font-sans overflow-x-hidden text-slate-900">
    <nav
      class="bg-[#1d4ed8] p-4 text-white flex justify-between items-center shadow-sm"
    >
      <div class="font-bold text-lg">MySite</div>

      <div
        class="md:hidden flex flex-col justify-between w-6 h-4 cursor-pointer"
      >
        <span class="h-0.5 w-full bg-white rounded-full"></span>
        <span class="h-0.5 w-full bg-white rounded-full"></span>
        <span class="h-0.5 w-full bg-white rounded-full"></span>
      </div>

      <ul class="hidden md:flex space-x-6 text-sm font-medium">
        <li>
          <a href="#" class="hover:text-blue-200 transition-colors">Home</a>
        </li>
        <li>
          <a href="#" class="hover:text-blue-200 transition-colors">About</a>
        </li>
        <li>
          <a href="#" class="hover:text-blue-200 transition-colors">Contact</a>
        </li>
      </ul>
    </nav>

    <main
      class="flex flex-col md:flex-row items-center justify-center gap-10 py-20 px-6 min-h-[calc(100vh-64px)]"
    >
      <div class="flex items-center space-x-6">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Tailwind_CSS_Logo.svg"
          alt="Tailwind Logo"
          class="w-24 h-24 md:w-36 md:h-36"
        />
        <h1
          class="text-6xl md:text-7xl font-extrabold text-slate-800 tracking-tighter"
        >
          Tailwind CSS
        </h1>
      </div>

      <div class="text-center md:text-left">
        <h2 class="text-2xl md:text-3xl font-bold">Learn Tailwind CSS</h2>

        <p class="text-gray-500 text-lg mt-2 whitespace-nowrap">
          Build responsive layouts quickly with utility-first CSS.
        </p>

        <button
          class="mt-6 bg-[#1d4ed8] text-white px-6 py-2 rounded-md text-sm font-semibold hover:bg-blue-800 transition-all shadow-md active:scale-95"
        >
          Get Started
        </button>
      </div>
    </main>
  </body>
</html>
